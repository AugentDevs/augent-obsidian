name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do that you can't?
      placeholder: "e.g. I want the file watcher to also handle .json files"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - File Handler (Open in Obsidian)
        - File Watcher
        - Setup / Installation
        - Uninstall
        - Documentation
        - Other
    validations:
      required: true
