name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. Double-clicking a .txt file still opens in TextEdit instead of Obsidian"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Double-click a .txt file on Desktop
        2. TextEdit opens instead of Obsidian
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.1"
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian version
      placeholder: "e.g. 1.7.4"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or relevant logs. Check ~/Library/Logs/obsidian-file-watcher.log if applicable.
      render: shell
    validations:
      required: false
